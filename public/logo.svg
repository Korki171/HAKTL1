<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="240" height="48" viewBox="0 0 240 48" role="img" aria-label="HAKTL logo">
  <defs>
    <clipPath id="topHalf">
      <rect x="0" y="0" width="240" height="24" />
    </clipPath>
    <clipPath id="bottomHalf">
      <rect x="0" y="24" width="240" height="24" />
    </clipPath>
  </defs>

  <!-- Blue and red color definitions matching Tailwind tokens -->
  <g font-family="Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial" font-weight="700" font-size="36">
    <!-- H split: top blue, bottom red achieved with two clipped text layers -->
    <g clip-path="url(#topHalf)">
      <text x="4" y="34" fill="#3b82f6">H</text>
    </g>
    <g clip-path="url(#bottomHalf)">
      <text x="4" y="34" fill="#ef4444">H</text>
    </g>

    <!-- ak in red -->
    <text x="38" y="34" fill="#ef4444">AK</text>

    <!-- tl in blue -->
    <text x="98" y="34" fill="#3b82f6">TL</text>
  </g>

</svg>
